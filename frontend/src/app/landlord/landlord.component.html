<div class="topnav">
    <a class="active" routerLink="tourist">Profil</a>
    <a routerLink="llreservation">Rezervacije</a>
    <a routerLink="llvikendice">Moje vikendice</a>
    <a routerLink="Stats">Statistika</a>
    <a class="logout" routerLink="../login" (click)="go()">Izloguj se</a>
</div>
<div class="TProfile">
    <h3>Zdravo {{user.username}}</h3>
    <hr/>
    Ime : <label for="">{{user.firstname}}</label> 
    <br/>
    Prezime : <label for="">{{user.lastname}}</label>
    <br/>
    Adresa : {{user.address}}
    <br/>
    E-mail : {{user.email}}
    <br/>
    Telefon : {{user.phone}}
    <br/>
    Broj kartice : {{user.credit}}
    <br/>
    Slika : <img src="{{user.pfp}}" alt="" class="pic">

</div>

<footer>Vlasnik {{user.username}} - Profile page</footer>

<style>
   .topnav a {
    float: none;
    color: #050505;
    text-align: center;
    padding: 14px 14px;
    text-decoration: solid;
    font-size: 17px;
    background-color: rgb(24, 90, 112);
  }
  
  /* Change the color of links on hover */
  .topnav a:hover {
    background-color: #ddd;
    color: black;
  }
  
  /* Add a color to the active/current link */
  .topnav a.active {
    background-color: #989b11;
    color: white;
  }

  .TProfile {
    margin-top: 2%;
    border: 1px outset rgb(0, 0, 0);
    background-color: lightblue;
    text-align: center;
    padding: 3px;
  } 
  footer{
    
    position: fixed;
    left: 0;
    bottom: 0;
    width: 100%;
    background-color: bisque;
    color: black;
    text-align: center;
  }

</style>
